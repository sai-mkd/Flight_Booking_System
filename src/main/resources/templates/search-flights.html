<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Search Flights</title>
</head>
<body>

<h2>Search Flights</h2>

<form id="searchForm">

    <label>Source Airport Code:</label>
    <input type="text" id="source" required>

    <br><br>

    <label>Destination Airport Code:</label>
    <input type="text" id="destination" required>

    <br><br>

    <label>Min Price:</label>
    <input type="number" id="minPrice" value="0">

    <br><br>

    <label>Max Price:</label>
    <input type="number" id="maxPrice" value="100000">

    <br><br>

    <button type="submit">Search Flights</button>

</form>

<hr>

<div id="results"></div>

<script>

    document.getElementById("searchForm")
        .addEventListener("submit", async function(e){

            e.preventDefault();

            const source =
                document.getElementById("source").value;

            const destination =
                document.getElementById("destination").value;

            const minPrice =
                document.getElementById("minPrice").value;

            const maxPrice =
                document.getElementById("maxPrice").value;

            const token =
                localStorage.getItem("token");

            const response = await fetch(
                `/api/flights/search?source=${source}&destination=${destination}&minPrice=${minPrice}&maxPrice=${maxPrice}`,
                {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                }
            );

            const flights = await response.json();

            let html = `
        <table border="1">
            <tr>
                <th>Flight</th>
                <th>Airline</th>
                <th>From</th>
                <th>To</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
    `;

            flights.forEach(flight => {

                html += `
            <tr>
                <td>${flight.flightNumber}</td>
                <td>${flight.airline}</td>
                <td>${flight.sourceAirport}</td>
                <td>${flight.destinationAirport}</td>
                <td>${flight.price}</td>
                <td>
                    <button onclick="bookFlight(${flight.id})">
                        Book
                    </button>
                </td>
            </tr>
        `;
            });

            html += "</table>";

            document.getElementById("results").innerHTML = html;

        });

    function bookFlight(id) {
        window.location.href =
            "/book/" + id;
    }

</script>

</body>
</html>
