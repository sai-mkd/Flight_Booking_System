    <a class="navbar-brand" href="/">✈ Flight System</a>

    <div>
        <a class="btn btn-outline-light btn-sm" href="/search-flights">Search Flights</a>
        <a class="btn btn-outline-light btn-sm" href="/my-bookings">My Bookings</a>
        <a class="btn btn-warning btn-sm" href="/admin-dashboard">Admin</a>
    </div>
</nav>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>

<h2>Admin Dashboard</h2>

<h3>Add Airport</h3>

<h3>All Flights</h3>

<table class="table table-bordered">
    <thead>
    <tr>
        <th>Flight No</th>
        <th>Airline</th>
        <th>Source</th>
        <th>Destination</th>
        <th>Price</th>
        <th>Seats</th>
    </tr>
    </thead>
    <tbody id="flightTable"></tbody>
</table>

<form id="airportForm">

    <input id="airportCode" placeholder="Airport Code" required>
    <input id="airportName" placeholder="Airport Name" required>
    <input id="city" placeholder="City" required>
    <input id="country" placeholder="Country" required>

    <button type="submit">Add Airport</button>

</form>

<hr>

<h3>Add Flight</h3>

<form id="flightForm">

    <input id="flightNumber" placeholder="Flight Number" required>
    <input id="airlineId" placeholder="Airline ID" required>
    <input id="sourceAirportId" placeholder="Source Airport ID" required>
    <input id="destinationAirportId" placeholder="Destination Airport ID" required>

    <input id="departureTime" type="datetime-local" required>
    <input id="arrivalTime" type="datetime-local" required>

    <input id="durationMinutes" placeholder="Duration" required>
    <input id="price" placeholder="Price" required>
    <input id="availableSeats" placeholder="Seats" required>

    <button type="submit">Add Flight</button>

</form>

<p id="msg"></p>

<script>

    const token = localStorage.getItem("token");

    /* AIRPORT */
    document.getElementById("airportForm")
        .addEventListener("submit", async function(e){

            e.preventDefault();

            const data = {
                airportCode: document.getElementById("airportCode").value,
                airportName: document.getElementById("airportName").value,
                city: document.getElementById("city").value,
                country: document.getElementById("country").value
            };

            const res = await fetch("/api/admin/airports", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify(data)
            });

            alert(await res.text());
        });

    /* FLIGHT */
    document.getElementById("flightForm")
        .addEventListener("submit", async function(e){

            e.preventDefault();

            const data = {
                flightNumber: document.getElementById("flightNumber").value,
                airlineId: document.getElementById("airlineId").value,
                sourceAirportId: document.getElementById("sourceAirportId").value,
                destinationAirportId: document.getElementById("destinationAirportId").value,
                departureTime: document.getElementById("departureTime").value,
                arrivalTime: document.getElementById("arrivalTime").value,
                durationMinutes: document.getElementById("durationMinutes").value,
                price: document.getElementById("price").value,
                availableSeats: document.getElementById("availableSeats").value
            };

            const res = await fetch("/api/admin/flights", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify(data)
            });

            const text = await res.text();
            document.getElementById("msg").innerText = text;
        });
    async function loadFlights() {

        const res = await fetch("/api/flights/search?source=&destination=&minPrice=0&maxPrice=999999");

        const data = await res.json();

        let rows = "";

        data.forEach(f => {
            rows += `
            <tr>
                <td>${f.flightNumber}</td>
                <td>${f.airline}</td>
                <td>${f.sourceAirport}</td>
                <td>${f.destinationAirport}</td>
                <td>${f.price}</td>
                <td>${f.availableSeats || '-'}</td>
                <td>
                <button class="btn btn-danger btn-sm"
                onclick="deleteFlight('${f.id}')">
                Delete
                </button>
                </td>
            </tr>
        `;
        });

        document.getElementById("flightTable").innerHTML = rows;
    }

    loadFlights();
    async function deleteFlight(id) {

        const token = localStorage.getItem("token");

        await fetch("/api/admin/flights/" + id, {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        alert("Flight deleted successfully");
        loadFlights();
    }

</script>

</body>
</html>
