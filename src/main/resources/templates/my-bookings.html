<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/">✈ Flight System</a>

    <div>
        <a class="btn btn-outline-light btn-sm" href="/search-flights">Search Flights</a>
        <a class="btn btn-outline-light btn-sm" href="/my-bookings">My Bookings</a>
        <a class="btn btn-warning btn-sm" href="/admin-dashboard">Admin</a>
    </div>
</nav>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!DOCTYPE html>
<html>
<head>
    <title>My Bookings</title>

    <style>
        .card {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 10px;
            border-radius: 8px;
        }

        .confirmed {
            color: green;
            font-weight: bold;
        }

        .cancelled {
            color: red;
            font-weight: bold;
        }

        button {
            padding: 6px 12px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>My Bookings</h2>

<div id="bookings"></div>

<script>

    async function loadBookings() {

        const token = localStorage.getItem("token");

        const response = await fetch(
            "/api/customer/bookings/my-bookings",
            {
                headers: {
                    "Authorization": "Bearer " + token
                }
            }
        );

        if (!response.ok) {
            document.getElementById("bookings").innerHTML =
                "Failed to load bookings";
            return;
        }

        const bookings = await response.json();

        let html = "";

        bookings.forEach(b => {

            const statusClass =
                b.status === "CANCELLED" ? "cancelled" : "confirmed";

            html += `
            <div class="card">

                <h3>PNR: ${b.pnr}</h3>

                <p><b>Flight:</b> ${b.flightNumber}</p>
                <p><b>Airline:</b> ${b.airline}</p>
                <p><b>From:</b> ${b.sourceAirport}</p>
                <p><b>To:</b> ${b.destinationAirport}</p>
                <p><b>Seats:</b> ${b.numberOfSeats}</p>
                <p><b>Price:</b> ₹${b.totalPrice}</p>

                <p class="${statusClass}">
                    Status: ${b.status}
                </p>

                <p><b>Booking Date:</b> ${b.bookingDate}</p>

                ${b.status !== "CANCELLED" ? `
                    <button onclick="cancelBooking('${b.pnr}')">
                        Cancel Booking
                    </button>
                ` : ""}

            </div>
        `;
        });

        document.getElementById("bookings").innerHTML = html;
    }

    async function cancelBooking(pnr) {

        const token = localStorage.getItem("token");

        const response = await fetch(
            "/api/customer/bookings/cancel/" + pnr,
            {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + token
                }
            }
        );

        if (response.ok) {

            alert("Booking cancelled successfully");

            loadBookings();

        } else {

            const error = await response.text();
            alert(error);
        }
    }

    loadBookings();

</script>

</body>
</html>
